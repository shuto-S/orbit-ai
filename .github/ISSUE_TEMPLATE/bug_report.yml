name: Bug report
description: Report a reproducible Orbit AI bug.
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Do not include secrets, tokens, private transcripts, or personal data.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction Steps
      description: Include commands and minimal config snippets with secrets removed.
      placeholder: |
        1. Run ...
        2. Type ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: dropdown
    id: backend
    attributes:
      label: LLM Backend
      options:
        - Codex app-server
        - Ollama
        - Other / not sure
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "macOS 15, Python 3.12, uv ..."
  - type: textarea
    id: verification
    attributes:
      label: Verification
      description: Paste relevant `make check` or targeted test output.
